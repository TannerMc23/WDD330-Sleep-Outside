<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" type="module"></script>
  <script type="module" src="/js/main.js"></script>
</head>

<body>
  <header class="divider">
    <div class="logo">
      <img src="public/images/noun_Tent_2517.svg" alt="tent image for logo" />
      <a href="index.html"> Sleep<span class="highlight">Outside</span></a>
    </div>
    <div class="cart">
      <a href="cart/index.html">
        <img src="public/images/noun_Backpack_65884.svg" alt="logo" />
        <span class="cart-count">0</span>
      </a>
    </div>
  </header>
  <main class="divider">
    <div class="hero">
      <img src="public/images/banner-sm.jpg" srcset="images/banner-sm.jpg 500w, images/banner.jpg"
        alt="image of a high mountain lake" />
      <div class="logo logo--square">
        <img src="public/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <div>Sleep<span class="highlight">Outside</span></div>
      </div>
      <div class="mission">
        <p>
          Our mission is to provide you with everything you need to sleep
          outside comfortably at an affordable price.
        </p>
      </div>
    </div>
    <section class="categories">
      <a href="/src/product_listing/index.html?category=tents">
        <img src="/src/images/category-tents.svg" alt="Tents" />
        <h3>Tents</h3>
      </a>

      <a href="/src/product_listing/index.html?category=backpacks">
        <img src="/src/images/category-backpacks.svg" alt="Backpacks" />
        <h3>Backpacks</h3>
      </a>

      <a href="/src/product_listing/index.html?category=sleeping-bags">
        <img src="/src/images/category-sleepingbags.svg" alt="Sleeping Bags" />
        <h3>Sleeping Bags</h3>
      </a>

      <a href="/src/product_listing/index.html?category=hammocks">
        <img src="/src/images/category-hammocks.svg" alt="Hammocks" />
        <h3>Hammocks</h3>
      </a>
    </section>
    <section class="products">
      <h2>Top Products</h2>
      <ul class="product-list"></ul>
    </section>
  </main>
  <footer id="main-footer"></footer>
</body>

</html>

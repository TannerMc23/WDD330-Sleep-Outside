<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/checkout.js"></script>
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="../product_listing/index.html">
          Sleep<span class="highlight">Outside</span></a
        >
      </div>

      <div class="cart">
        <a href="./index.html">
          <img src="/images/noun_Backpack_65884.svg" alt="logo" />
          <span class="cart-count">0</span>
        </a>
      </div>
    </header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>

        <div class="wrapper">
          <!-- Formular -->
         <form id="checkoutForm">
  <!-- Customer Name -->
  <label for="firstName">First Name</label>
  <input type="text" id="firstName" name="fname" required />

  <label for="lastName">Last Name</label>
  <input type="text" id="lastName" name="lname" required />

  <!-- Address -->
  <label for="street">Street Address</label>
  <input type="text" id="street" required />

  <label for="city">City</label>
  <input type="text" id="city" required />

  <label for="state">State</label>
  <input type="text" id="state" required />

  <label for="zip">Zip Code</label>
  <input type="text" id="zip" required pattern="\d{5}" title="Enter a valid 5-digit zip code" />

  <!-- Payment -->
  <label for="cardNumber">Credit Card Number</label>
  <input type="text" id="cardNumber" name="cardNumber" required pattern="\d{16}" />

  <label for="expDate">Expiration Date</label>
  <input type="month" id="expDate" name="expiration" required />

  <label for="cvv">Security Code (CVV)</label>
  <input type="text" id="cvv" name="cvv" required pattern="\d{3}" />

  <button class="btn" type="submit">Checkout</button>
</form>

          <!-- Order Summary -->
          <div class="order-summary">
            <h2>Order Summary</h2>
            <div>
              <span>Subtotal:</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div>
              <span>Tax (6%):</span>
              <span id="tax">$0.00</span>
            </div>
            <div>
              <span>Shipping Estimate:</span>
              <span id="shipping">$5.00</span>
            </div>
            <div class="total">
              <span>Total:</span>
              <span id="total">$0.00</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>&copy;NOT a real business</footer>
  </body>
</html>
